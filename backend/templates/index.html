<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Price Predictor | Sri Lanka</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --success: #22c55e;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-left: 4px;
        }

        input,
        select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, var(--primary), #8b5cf6);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        #result {
            margin-top: 30px;
            border-radius: 16px;
            padding: 20px;
            display: none;
            animation: fadeIn 0.4s ease-out;
            text-align: center;
        }

        .success-box {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .result-title {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--success);
        }

        .error-message {
            color: var(--error);
            font-weight: 500;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            .container {
                padding: 24px;
            }

            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Vehicle Value Predictor</h1>
            <p class="subtitle">Enter vehicle details to estimate current market price in Sri Lanka</p>
        </header>

        <form id="predictionForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>Brand</label>
                    <select name="Brand" id="brandSelect" required>
                        <option value="">Select Brand</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Model</label>
                    <select name="Model" id="modelSelect" required disabled>
                        <option value="">Select Brand First</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Year of Manufacture</label>
                    <select name="YOM" id="yomSelect" required>
                        <option value="">Select Year</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Engine Capacity (cc)</label>
                    <input type="number" name="Engine_cc" id="engineInput" value="1000" min="100" max="5000" required placeholder="1000">
                </div>
                <div class="form-group">
                    <label>Gear Type</label>
                    <select name="Gear" id="gearSelect">
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Fuel Type</label>
                    <select name="Fuel_Type" id="fuelSelect">
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Mileage (KM)</label>
                    <input type="number" name="Millage_KM" value="50000" min="0" max="300000" required placeholder="50000">
                </div>
                <div class="form-group">
                    <label>Town</label>
                    <select name="Town" id="townSelect" required>
                        <option value="">Select Town</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Leasing</label>
                    <select name="Leasing" id="leasingSelect">
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Condition</label>
                    <select name="Condition" id="conditionSelect">
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Air Condition</label>
                    <select name="AIR_CONDITION" id="acSelect">
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Power Steering</label>
                    <select name="POWER_STEERING" id="psSelect">
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Power Mirror</label>
                    <select name="POWER_MIRROR" id="pmSelect">
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Power Window</label>
                    <select name="POWER_WINDOW" id="pwSelect">
                        <!-- Populated by JS -->
                    </select>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span class="loader" id="loader"></span>
                <span id="btnText">Predict Price</span>
            </button>
        </form>

        <div id="result"></div>
    </div>

    <script>
        // Fetch and Populate Options
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Add timestamp to prevent caching
                const response = await fetch('/options?t=' + new Date().getTime());
                if (!response.ok) throw new Error("Failed to load options");
                const options = await response.json();

                console.log("Options loaded:", Object.keys(options));

                // Helper to populate select
                const populate = (id, items, defaultText = "Select") => {
                    const select = document.getElementById(id);
                    if (!select) return;

                    select.innerHTML = `<option value="">${defaultText}</option>`;
                    if (!items || !Array.isArray(items)) return;

                    items.forEach(item => {
                        const display = item.toString().replace(/_/g, ' ').toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
                        const value = item;

                        const option = document.createElement('option');
                        option.value = value;
                        option.textContent = display;
                        select.appendChild(option);
                    });
                };

                // Populate Independent Dropdowns
                if (options.Brand) populate('brandSelect', options.Brand, "Select Brand");
                if (options.Town) populate('townSelect', options.Town, "Select Town");
                if (options.YOM) populate('yomSelect', options.YOM, "Select Year");

                if (options.Gear) populate('gearSelect', options.Gear, "Select Gear");
                if (options['Fuel Type']) populate('fuelSelect', options['Fuel Type'], "Select Fuel Type");
                if (options.Leasing) populate('leasingSelect', options.Leasing, "Select Leasing Option");
                if (options.Condition) populate('conditionSelect', options.Condition, "Select Condition");
                if (options['AIR CONDITION']) populate('acSelect', options['AIR CONDITION'], "Select Status");
                if (options['POWER STEERING']) populate('psSelect', options['POWER STEERING'], "Select Status");
                if (options['POWER MIRROR']) populate('pmSelect', options['POWER MIRROR'], "Select Status");
                if (options['POWER WINDOW']) populate('pwSelect', options['POWER WINDOW'], "Select Status");

                // Handle Brand -> Model Dependency
                const brandSelect = document.getElementById('brandSelect');
                const modelSelect = document.getElementById('modelSelect');
                const engineInput = document.getElementById('engineInput');

                // Helper: reset a select to allow all options
                const resetToAll = (id, allItems, label) => {
                    populate(id, allItems, label);
                    document.getElementById(id).disabled = false;
                };

                // Called when a model is selected — lock fuel, gear, engine to valid values
                const applyModelConstraints = (modelValue) => {
                    if (!modelValue) {
                        resetToAll('fuelSelect', options['Fuel Type'], 'Select Fuel Type');
                        resetToAll('gearSelect', options.Gear, 'Select Gear Type');
                        if (engineInput) { engineInput.min = 100; engineInput.max = 5000; }
                        return;
                    }

                    // Lock Fuel Type
                    const validFuels = options.FuelByModel && options.FuelByModel[modelValue];
                    if (validFuels && validFuels.length > 0) {
                        populate('fuelSelect', validFuels, 'Select Fuel Type');
                        // Auto-select if only one option
                        if (validFuels.length === 1) {
                            document.getElementById('fuelSelect').value = validFuels[0];
                        }
                    } else {
                        resetToAll('fuelSelect', options['Fuel Type'], 'Select Fuel Type');
                    }

                    // Lock Gear Type
                    const validGears = options.GearByModel && options.GearByModel[modelValue];
                    if (validGears && validGears.length > 0) {
                        populate('gearSelect', validGears, 'Select Gear Type');
                        if (validGears.length === 1) {
                            document.getElementById('gearSelect').value = validGears[0];
                        }
                    } else {
                        resetToAll('gearSelect', options.Gear, 'Select Gear Type');
                    }

                    // Lock Engine CC range
                    const engineRange = options.EngineByModel && options.EngineByModel[modelValue];
                    if (engineRange && engineInput) {
                        engineInput.min = engineRange.min;
                        engineInput.max = engineRange.max;
                        // Clamp current value
                        const cur = parseFloat(engineInput.value);
                        if (cur < engineRange.min) engineInput.value = engineRange.min;
                        if (cur > engineRange.max) engineInput.value = engineRange.max;
                        engineInput.title = `Valid range for this model: ${engineRange.min}cc - ${engineRange.max}cc`;
                    }
                };

                if (brandSelect && modelSelect) {
                    brandSelect.addEventListener('change', (e) => {
                        const brand = e.target.value;
                        if (options.ModelsByBrand && brand && options.ModelsByBrand[brand]) {
                            populate('modelSelect', options.ModelsByBrand[brand], 'Select Model');
                            modelSelect.disabled = false;
                        } else {
                            modelSelect.innerHTML = '<option value="">Select Brand First</option>';
                            modelSelect.disabled = true;
                        }
                        // Reset constraints when brand changes
                        applyModelConstraints(null);
                    });

                    modelSelect.addEventListener('change', (e) => {
                        applyModelConstraints(e.target.value);
                    });
                }

            } catch (error) {
                console.error("Error loading options:", error);
                const resultDiv = document.getElementById('result');
                if (resultDiv) {
                    resultDiv.style.display = 'block';
                    resultDiv.className = 'error-box';
                    resultDiv.innerHTML = '<div class="error-message">Failed to load form options. Please refresh.</div>';
                }
            }
        });

        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const form = e.target;
            const submitBtn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            const resultDiv = document.getElementById('result');

            // Show loading state
            submitBtn.disabled = true;
            loader.style.display = 'block';
            btnText.textContent = 'Calculating...';
            resultDiv.style.display = 'none';

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            // Client-side validation
            const engine_cc = parseFloat(data.Engine_cc);
            const millage = parseFloat(data.Millage_KM);

            if (engine_cc < 100 || engine_cc > 5000) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'error-box';
                resultDiv.innerHTML = `<div class="error-message">Error: Please enter a valid Engine Capacity (100 - 5000 cc).</div>`;
                submitBtn.disabled = false;
                loader.style.display = 'none';
                btnText.textContent = 'Predict Price';
                return;
            }

            if (millage < 0 || millage > 300000) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'error-box';
                resultDiv.innerHTML = `<div class="error-message">Error: Please enter a valid Mileage (0 - 300,000 KM).</div>`;
                submitBtn.disabled = false;
                loader.style.display = 'none';
                btnText.textContent = 'Predict Price';
                return;
            }

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data),
                });

                const result = await response.json();

                resultDiv.style.display = 'block';
                if (response.ok) {
                    resultDiv.className = 'success-box';
                    resultDiv.innerHTML = `
                        <div class="result-title">Estimated Market Value</div>
                        <div class="result-value">LKR ${result.estimated_price_lakhs} Lakhs</div>
                    `;
                } else {
                    resultDiv.className = 'error-box';
                    resultDiv.innerHTML = `
                        <div class="error-message">Error: ${result.error || 'Prediction failed'}</div>
                    `;
                }
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'error-box';
                resultDiv.innerHTML = `
                    <div class="error-message">Failed to connect to the server.</div>
                `;
            } finally {
                submitBtn.disabled = false;
                loader.style.display = 'none';
                btnText.textContent = 'Predict Price';
            }
        });
    </script>
</body>

</html>
